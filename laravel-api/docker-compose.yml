services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: espcam-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
      - "${APP_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./src:/app
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SERVER_NAME: "${SERVER_NAME:-:80}"
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "true"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-espcam_db}"
      DB_USERNAME: "${DB_USERNAME:-espcam}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      WA_GATEWAY_URL: "http://wa-gateway:3001"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: espcam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-espcam_db}"
      POSTGRES_USER: "${DB_USERNAME:-espcam}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-espcam} -d ${DB_DATABASE:-espcam_db}"]
      interval: 5s
      timeout: 10s
      retries: 20

  wa-gateway:
    build:
      context: ./wa-gateway
      dockerfile: Dockerfile
    container_name: wa-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - wa_session:/app/session

volumes:
  db_data:
  caddy_data:
  caddy_config:
  wa_session:
